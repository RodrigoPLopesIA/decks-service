server:
  port: 8082
spring:
  application:
    name: decks
  mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://root:example@localhost:27017/decks?authSource=admin}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:http://localhost:8080/realms/masterdeckai-realm}
management:
  endpoints:
    web:
      exposure:
        include: "*"