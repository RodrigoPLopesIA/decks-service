server:
  port: 8082
spring:
  application:
    name: decks
  mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://root:example@mongodb-service:27017/decks?authSource=admin}

  oauth2:
    resourceserver:
      jwt:
        issuer-uri: http://localhost:8080/realms/masterdeckai-realm
management:
  endpoints:
    web:
      exposure:
        include: "*"